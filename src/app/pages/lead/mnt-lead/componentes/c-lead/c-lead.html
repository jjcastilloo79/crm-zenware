                <div class="card flex flex-col gap-3 md:w-1/2">
                    <div class="flex flex-wrap gap-1">                        
                        <div class="flex flex-col">
                            <label>Fecha</label>
                            <p-datepicker [(ngModel)]="annio" dateFormat="dd/mm/yy" inputId="yearpicker" [showIcon]="true" size="small"></p-datepicker>
                        </div>
                    </div>
                    <div class="flex flex-wrap">                          
                        <div class="flex flex-col grow gap-1">
                            <label>Nombre de Oportunidad</label>
                            <input pInputText  type="text" pSize="small" class="w-auto" />

                        </div>
                    </div>
                    <div class="flex flex-wrap">  
                        <div class="flex flex-col gap-1">
                            <label>RUC</label>
                            <p-inputNumber locale="es-PE" mode="decimal"
                            name="por_cierre" [min]="0" [max]="100" size="small"></p-inputNumber>
                        </div>
                    </div>
                    <div class="flex flex-wrap">  
                        <div class="flex flex-col grow basis-0 gap-1">
                            <label>Empresa</label>
                            <p-select [options]="lstSector" [(ngModel)]="idsector" id="idcliente" placeholder="Seleccionar..." optionLabel="nomcomercial"
                            [ngModelOptions]="{standalone: true}" optionValue="idcliente" size="small"></p-select>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2">  
                        <div class="flex flex-col grow basis-0 gap-1">
                            <label>Industria/Sector</label>
                            <p-select [options]="lstSector" [(ngModel)]="idsector" id="idcliente" placeholder="Seleccionar..." optionLabel="nomcomercial"
                            [ngModelOptions]="{standalone: true}" optionValue="idcliente" size="small"></p-select>
                        </div>
                        <div class="flex flex-col grow basis-0 gap-1">
                            <label>Origen</label>
                            <p-select [options]="lstSector" [(ngModel)]="idsector" id="idcliente" placeholder="Seleccionar..." optionLabel="nomcomercial"
                            [ngModelOptions]="{standalone: true}" optionValue="idcliente" size="small"></p-select>
                        </div>
                    </div>
                </div>

    </p-fluid>-->
