<div class="card flex flex-col gap-3 md:w-1/2">
    <div class="flex flex-wrap">
        <div class="flex flex-col grow gap-1">
            <label>Nombre del Proyecto</label>
            <input pInputText type="text" pSize="small" class="w-auto" />
        </div>
    </div>
    <div class="flex flex-wrap gap-2">
        <div class="flex flex-col grow basis-0 gap-1">
            <label>Origen</label>
            <textarea rows="3" cols="30" pTextarea size="small"></textarea>
        </div>
    </div>
    <div class="flex flex-wrap gap-2">
        <div class="flex flex-col grow basis-0 gap-1">
            <label>Alcance</label>
            <p-select [options]="lstSector" [(ngModel)]="idsector" id="idcliente" placeholder="Seleccionar..." optionLabel="nomcomercial" [ngModelOptions]="{standalone: true}" optionValue="idcliente" size="small"></p-select>
        </div>
        <div class="flex flex-col grow basis-0 gap-1">
            <label>Estado</label>
            <p-select [options]="lstSector" [(ngModel)]="idsector" id="idcliente" placeholder="Seleccionar..." optionLabel="nomcomercial" [ngModelOptions]="{standalone: true}" optionValue="idcliente" size="small"></p-select>
        </div>
    </div>
</div>
