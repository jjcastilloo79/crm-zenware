<div class="card flex flex-col gap-3 md:w-1/2">
    <div class="flex flex-wrap gap-2">  
        <div class="flex flex-col grow basis-0 gap-1">
            <label>Etapas</label>
            <p-select [options]="lstSector" [(ngModel)]="idsector" id="idcliente" placeholder="Seleccionar..." optionLabel="nomcomercial"
            [ngModelOptions]="{standalone: true}" optionValue="idcliente" size="small"></p-select>
        </div>
        <div class="flex flex-col grow basis-0 gap-1">
            <label>Tiempos Estimados</label>
            <p-select [options]="lstSector" [(ngModel)]="idsector" id="idcliente" placeholder="Seleccionar..." optionLabel="nomcomercial"
            [ngModelOptions]="{standalone: true}" optionValue="idcliente" size="small"></p-select>
        </div>
    </div>
     <div class="flex flex-wrap">                          
        <div class="flex flex-col grow gap-1">
            <label>Stakeholders involucrados</label>
            <textarea rows="3" cols="30" pTextarea size="small"></textarea>
        </div>
    </div>
</div>
